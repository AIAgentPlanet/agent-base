        type: integer
      loginAt:
        type: integer
      nickname:
        type: string
      phone:
        type: string
      status:
        type: integer
      updatedAt:
        type: integer
      username:
        type: string
    type: object
  query.Column:
    properties:
      exp:
        description: expressions, default value is "=", support =, !=, >, >=, <, <=,
          like, in, notin, isnull, isnotnull
        type: string
      logic:
        description: logical type, defaults to and when the value is null, with &(and),
          ||(or)
        type: string
      name:
        description: column name
        type: string
      value:
        description: column value
    type: object
host: localhost:8080
info:
  contact: {}
  description: http server api docs
  title: user_service api docs
  version: v1.0.0
paths:
  /api/v1/oauth/authorize:
    get:
      consumes:
      - application/json
      description: Initiate OAuth 2.0 authorization code flow, user must be logged
        in
      parameters:
      - description: response type, must be 'code'
        in: query
        name: response_type
        required: true
        type: string
      - description: client id
        in: query
        name: client_id
        required: true
        type: string
      - description: redirect uri
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: requested scopes
        in: query
        name: scope
        type: string
      - description: state parameter
        in: query
        name: state
        type: string
      - description: PKCE code challenge
        in: query
        name: code_challenge
        type: string
      - description: 'PKCE code challenge method: plain or S256'
        in: query
        name: code_challenge_method
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: redirect to client redirect_uri with code
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: OAuth authorization endpoint
      tags:
      - oauth
  /api/v1/oauth/clients:
    post:
      consumes:
      - application/json
      description: List all OAuth clients registered by current user
      parameters:
      - description: query parameters
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.ListOAuthClientsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.ListOAuthClientsReply'
      security:
      - BearerAuth: []
      summary: List OAuth clients
      tags:
      - oauth
  /api/v1/oauth/clients/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an OAuth client by id
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.DeleteOAuthClientByIDReply'
      security:
      - BearerAuth: []
      summary: Delete OAuth client
      tags:
      - oauth
    put:
      consumes:
      - application/json
      description: Update OAuth client information
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: client information
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.UpdateOAuthClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.UpdateOAuthClientReply'
      security:
      - BearerAuth: []
      summary: Update OAuth client
      tags:
      - oauth
  /api/v1/oauth/revoke:
    post:
      consumes:
      - application/json
      description: Revoke an access or refresh token
      parameters:
      - description: revoke request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.OAuthRevokeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.OAuthRevokeReply'
      summary: OAuth revoke token endpoint
      tags:
      - oauth
  /api/v1/oauth/token:
    post:
      consumes:
      - application/json
      description: Exchange authorization code for tokens or refresh tokens
      parameters:
      - description: token request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.OAuthTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.OAuthTokenReply'
      summary: OAuth token endpoint
      tags:
      - oauth
  /api/v1/oauth/userinfo:
    get:
      consumes:
      - application/json
      description: Get current user info using OAuth access token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.OAuthUserInfoReply'
      summary: OAuth userinfo endpoint
      tags:
      - oauth
  /api/v1/users:
    post:
      consumes:
      - application/json
      description: Creates a new users entity using the provided data in the request
        body.
      parameters:
      - description: users information
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.CreateUsersRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.CreateUsersReply'
      security:
      - BearerAuth: []
      summary: Create a new users
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a existing users identified by the given id in the path.
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.DeleteUsersByIDReply'
      security:
      - BearerAuth: []
      summary: Delete a users by id
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Gets detailed information of a users specified by the given id
        in the path.
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.GetUsersByIDReply'
      security:
      - BearerAuth: []
      summary: Get a users by id
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates the specified users by given id in the path, support partial
        update.
      parameters:
      - description: id
        in: path
        name: id
        required: true
        type: string
      - description: users information
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.UpdateUsersByIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.UpdateUsersByIDReply'
      security:
      - BearerAuth: []
      summary: Update a users by id
      tags:
      - users
  /api/v1/users/condition:
    post:
      consumes:
      - application/json
      description: Returns a single users that matches the specified filter conditions.
      parameters:
      - description: query condition
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.Conditions'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.GetUsersByConditionReply'
      security:
      - BearerAuth: []
      summary: Get a users by custom condition
      tags:
      - users
  /api/v1/users/delete/ids:
    post:
      consumes:
      - application/json
      description: Deletes multiple users by a list of id
      parameters:
      - description: id array
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.DeleteUserssByIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.DeleteUserssByIDsReply'
      security:
      - BearerAuth: []
      summary: Batch delete users by ids
      tags:
      - users
  /api/v1/users/list:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of userss starting after a given last
        id, useful for cursor-based pagination.
      parameters:
      - default: 0
        description: last id, default is MaxInt32
        in: query
        name: lastID
        type: integer
      - default: 10
        description: number per page
        in: query
        name: limit
        type: integer
      - default: -id
        description: 'sort by column name of table, and the '
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.ListUserssReply'
      security:
      - BearerAuth: []
      summary: Get a paginated list of userss by last id
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Returns a paginated list of users based on query filters, including
        page number and size.
      parameters:
      - description: query parameters
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.Params'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.ListUserssReply'
      security:
      - BearerAuth: []
      summary: Get a paginated list of userss by custom conditions
      tags:
      - users
  /api/v1/users/list/ids:
    post:
      consumes:
      - application/json
      description: Returns a list of users that match the list of id.
      parameters:
      - description: id array
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.ListUserssByIDsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/agent-base_services_user-service_internal_types.ListUserssByIDsReply'
      security:
      - BearerAuth: []
      summary: Batch get users by ids
      tags:
      - users
  /api/v1/users/login:
    post:
      consumes:
      - application/json
      description: Login with username and password, return JWT token
      parameters:
      - description: login credentials
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/agent-base_services_user-service_internal_types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
